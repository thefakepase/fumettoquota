name: Pubblica il gioco su GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - public/grand-line-survivors.html
      - .github/workflows/deploy-game.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepara il sito statico
        run: |
          mkdir _site
          cp public/grand-line-survivors.html _site/index.html
          cp public/grand-line-survivors.html _site/grand-line-survivors.html
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
