name: Pubblica il gioco su GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - public/grand-line-survivors.html
      - .github/workflows/deploy-game.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pubblica sul branch gh-pages
        run: |
          mkdir _site
          cp public/grand-line-survivors.html _site/index.html
          cp public/grand-line-survivors.html _site/grand-line-survivors.html
          touch _site/.nojekyll
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy del gioco su GitHub Pages"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
