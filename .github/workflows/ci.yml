name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: node --check server.js

      - name: Run tests
        run: npm test
        env:
          SESSION_SECRET: test-secret-ci
          PORT: 3001
          ADMIN_TOKEN: test-admin-token-ci
